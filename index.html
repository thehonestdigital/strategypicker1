  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

04, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* cyrillic-ext */\n@font-face {\n  font-family: 'Raleway';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"e7fad748-a86b-4383-9acf-9c90e4d5c61a\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'Raleway';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"147bddf9-3616-4434-a507-e3a31aa3cc2e\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Raleway';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"90d52689-6e3a-4023-aa04-d313ee29b261\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Raleway';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"48a7c5b2-dc14-4c81-b248-dde3babdcee3\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Raleway';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"70062267-c8a5-4784-8d36-b96d8a4adcaf\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* cyrillic-ext */\n@font-face {\n  font-family: 'Raleway';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"e7fad748-a86b-4383-9acf-9c90e4d5c61a\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'Raleway';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"147bddf9-3616-4434-a507-e3a31aa3cc2e\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Raleway';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"90d52689-6e3a-4023-aa04-d313ee29b261\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Raleway';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"48a7c5b2-dc14-4c81-b248-dde3babdcee3\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Raleway';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"70062267-c8a5-4784-8d36-b96d8a4adcaf\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* ===========================================================================\n   Honest Digital, Color Tokens\n   ---------------------------------------------------------------------------\n   A warm, grown-from-the-earth palette: sage greens, cream paper, blush sand,\n   butter-yellow sunlight, ink + deep forest for contrast, dusty teal as a cool\n   accent. The brand is honest and natural, colors stay muted and a little\n   earthy; nothing neon, nothing cold-corporate.\n   =========================================================================== */\n\n:root {\n  /* ---- Raw brand palette (the swatch board) -------------------------------- */\n  --hd-sage:        #8c9a67;  /* primary brand green, dandelion-stem sage      */\n  --hd-sage-muted:  #7c8a6a;  /* secondary, softer green for fills/blocks       */\n  --hd-cream:       #faf7f0;  /* paper / primary light background               */\n  --hd-sand:        #e7d8c9;  /* blush-tan, warm neutral surface / dividers    */\n  --hd-butter:      #ffeb99;  /* sunlight yellow, highlight & joy accent       */\n  --hd-forest:      #314235;  /* deep evergreen, dark surface / depth          */\n  --hd-teal:        #5f8c87;  /* dusty teal-blue, cool accent / links          */\n  --hd-ink:         #2f2f2f;  /* charcoal, primary text on light               */\n  --hd-black:       #000000;  /* true black, logo, max contrast                */\n  --hd-white:       #ffffff;  /* pure white, rare, for crisp UI cards          */\n\n  /* ---- Tonal extensions (derived, used for states & depth) ----------------- */\n  --hd-sage-50:     #f1f3ea;  /* faintest sage wash                             */\n  --hd-sage-100:    #dfe5d0;\n  --hd-sage-200:    #c3cfa6;\n  --hd-sage-600:    #75835a;  /* sage hover / pressed                           */\n  --hd-sage-700:    #5f6b49;\n  --hd-cream-200:   #f2ece0;  /* cream, one step warmer for hover on paper      */\n  --hd-sand-200:    #dcc9b6;  /* sand, deeper, pressed states                  */\n  --hd-forest-600:  #263528;  /* forest hover / pressed                         */\n  --hd-ink-60:      #6b6b6b;  /* muted ink, secondary text                     */\n  --hd-ink-40:      #9a9a9a;  /* faint ink, tertiary text, captions            */\n\n  /* ===== SEMANTIC ALIASES ================================================== */\n\n  /* Surfaces */\n  --surface-page:        var(--hd-cream);     /* default page background        */\n  --surface-card:        var(--hd-white);     /* raised card on cream           */\n  --surface-sunken:      var(--hd-sand);      /* wells, inputs, dividers ground */\n  --surface-inverse:     var(--hd-forest);    /* dark sections                  */\n  --surface-inverse-alt: var(--hd-ink);       /* near-black dark sections       */\n  --surface-accent:      var(--hd-sage);      /* brand-green block              */\n\n  /* Text */\n  --text-strong:    var(--hd-ink);            /* headings & primary body        */\n  --text-body:      var(--hd-ink);            /* paragraph text                 */\n  --text-muted:     var(--hd-ink-60);         /* secondary / supporting         */\n  --text-faint:     var(--hd-ink-40);         /* captions, meta, placeholder    */\n  --text-on-dark:   var(--hd-cream);          /* text on forest/ink surfaces    */\n  --text-on-accent: var(--hd-forest);         /* text on sage / butter blocks   */\n\n  /* Brand / interactive */\n  --brand:          var(--hd-sage);           /* primary brand action           */\n  --brand-hover:    var(--hd-sage-600);\n  --brand-pressed:  var(--hd-sage-700);\n  --accent:         var(--hd-butter);         /* highlight / joy                */\n  --link:           var(--hd-teal);           /* hyperlink color                */\n  --link-hover:     #4d7670;\n\n  /* Lines & dividers */\n  --border-soft:    var(--hd-sand);           /* hairline on cream              */\n  --border-strong:  var(--hd-ink);            /* high-contrast outline          */\n  --border-on-dark: rgba(250, 247, 240, 0.16);\n\n  /* Feedback */\n  --positive:       var(--hd-sage);\n  --warning:        #d6a93c;                  /* deepened butter for warnings   */\n  --danger:         #b4523f;                  /* warm terracotta error          */\n  --focus-ring:     var(--hd-teal);\n}\n\n/* ===========================================================================\n   Honest Digital, Typography Tokens\n   ---------------------------------------------------------------------------\n   Two voices in conversation:\n   • Raleway (sans)       , structural, friendly, confident. Headings set in\n                             ExtraBold (800) lower-case echo the \"honest\" logo.\n                             All UI, labels and body copy.\n   • Times New Roman (serif, BOLD ITALIC), the editorial, human voice. Used for\n                             the \"digital / for artists\" accent, pull-quotes,\n                             eyebrows and emphasis. Almost always italic.\n   =========================================================================== */\n\n:root {\n  /* ---- Families ----------------------------------------------------------- */\n  --font-sans:   'Raleway', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;\n  --font-serif:  'Times New Roman', Times, Georgia, serif;\n  --font-display: var(--font-sans);          /* big lowercase Raleway headings  */\n  --font-accent:  var(--font-serif);         /* italic serif accents            */\n\n  /* ---- Weights ------------------------------------------------------------ */\n  --fw-regular:   400; /* @kind font */\n  --fw-medium:    500; /* @kind font */\n  --fw-semibold:  600; /* @kind font */\n  --fw-bold:      700; /* @kind font */\n  --fw-extrabold: 800; /* @kind font */\n\n  /* ---- Type scale (rem, 1rem = 16px), gentle, editorial ------------------ */\n  --fs-display:   4.5rem;   /* 72px, hero lockups               */\n  --fs-h1:        3rem;     /* 48px                              */\n  --fs-h2:        2.25rem;  /* 36px                              */\n  --fs-h3:        1.625rem; /* 26px                              */\n  --fs-h4:        1.25rem;  /* 20px                              */\n  --fs-body-lg:   1.125rem; /* 18px, comfortable reading        */\n  --fs-body:      1rem;     /* 16px                              */\n  --fs-small:     0.875rem; /* 14px                              */\n  --fs-caption:   0.75rem;  /* 12px, meta, eyebrows             */\n\n  /* ---- Line heights ------------------------------------------------------- */\n  --lh-tight:     1.05;     /* @kind font */\n  --lh-snug:      1.2;      /* @kind font */\n  --lh-normal:    1.55;     /* @kind font */\n  --lh-relaxed:   1.7;      /* @kind font */\n\n  /* ---- Letter spacing ----------------------------------------------------- */\n  --ls-tight:     -0.02em;  /* @kind font */\n  --ls-normal:    0em;      /* @kind font */\n  --ls-eyebrow:   0.18em;   /* @kind font */\n\n  /* ===== SEMANTIC ALIASES ================================================== */\n  --text-display-font:  var(--font-display);\n  --text-display-weight: var(--fw-extrabold);\n  --text-heading-font:  var(--font-sans);\n  --text-heading-weight: var(--fw-bold);\n  --text-body-font:     var(--font-sans);\n  --text-accent-font:   var(--font-serif);   /* bold-italic serif             */\n}\n\n/* ===========================================================================\n   Honest Digital, Spacing, Radii, Shadow & Motion Tokens\n   ---------------------------------------------------------------------------\n   Generous, calm spacing. Soft but not bubbly corners. Shadows are low and\n   warm (tinted toward ink, never blue). Motion is gentle, things ease in like\n   a seed settling, never bounce.\n   =========================================================================== */\n\n:root {\n  /* ---- Spacing scale (4px base) ------------------------------------------- */\n  --space-0:   0;\n  --space-1:   0.25rem;   /* 4   */\n  --space-2:   0.5rem;    /* 8   */\n  --space-3:   0.75rem;   /* 12  */\n  --space-4:   1rem;      /* 16  */\n  --space-5:   1.5rem;    /* 24  */\n  --space-6:   2rem;      /* 32  */\n  --space-7:   3rem;      /* 48  */\n  --space-8:   4rem;      /* 64  */\n  --space-9:   6rem;      /* 96  */\n  --space-10:  8rem;      /* 128 */\n\n  /* ---- Radii, soft, organic, never sharp --------------------------------- */\n  --radius-xs:   4px;\n  --radius-sm:   8px;\n  --radius-md:   14px;    /* default card / button radius      */\n  --radius-lg:   22px;\n  --radius-xl:   32px;\n  --radius-pill: 999px;   /* pills, chips, avatars             */\n\n  /* ---- Borders ------------------------------------------------------------ */\n  --border-width:   1px;\n  --border-width-2: 2px;  /* emphasised / dark outlines        */\n\n  /* ---- Shadows, warm, low, diffuse (ink-tinted, never blue) --------------- */\n  --shadow-xs:  0 1px 2px rgba(47, 47, 47, 0.06);\n  --shadow-sm:  0 2px 6px rgba(47, 47, 47, 0.07);\n  --shadow-md:  0 8px 22px rgba(47, 47, 47, 0.09);\n  --shadow-lg:  0 18px 44px rgba(47, 47, 47, 0.12);\n  --shadow-focus: 0 0 0 3px rgba(95, 140, 135, 0.40);  /* teal focus ring     */\n\n  /* ---- Layout ------------------------------------------------------------- */\n  --container-max:    1200px;\n  --container-narrow: 760px;   /* long-form reading width           */\n  --gutter:           var(--space-5);\n\n  /* ---- Motion, gentle, settling, no bounce ------------------------------- */\n  --ease-out:    cubic-bezier(0.22, 0.61, 0.36, 1);   /* @kind other */\n  --ease-in-out: cubic-bezier(0.45, 0.05, 0.55, 0.95); /* @kind other */\n  --dur-fast:    140ms;   /* @kind other */\n  --dur-base:    240ms;   /* @kind other */\n  --dur-slow:    420ms;   /* @kind other */\n}\n\n<\u002Fstyle>\n<style>\n  * { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; }\n  body {\n    font-family: var(--font-sans);\n    color: var(--text-strong);\n    background: var(--hd-teal);\n    -webkit-font-smoothing: antialiased;\n    min-height: 100vh;\n  }\n\n  /* ===== shared shell ===== */\n  .stage { min-height: 100vh; display: flex; flex-direction: column; }\n  .wrap { width: 100%; max-width: 1080px; margin: 0 auto; padding: 0 28px; }\n\n  .view { opacity: 1; }\n  @media (prefers-reduced-motion: no-preference) {\n    .view { animation: rise .34s cubic-bezier(.16,.84,.44,1) both; }\n  }\n  @keyframes rise { from { transform: translateY(10px); } to { transform: none; } }\n\n  /* ===== topbar ===== */\n  .topbar { flex: 0 0 auto; padding: 26px 0 0; }\n  .topbar .wrap { display: flex; align-items: center; justify-content: space-between; }\n  .topbar img.logo { height: 26px; width: auto; display: block; }\n  .topbar .kick { font-family: var(--font-serif); font-style: italic; font-weight: 700; font-size: 13px; color: rgba(250,247,240,.82); }\n\n  /* ===== HOME (teal) ===== */\n  .home { flex: 1 1 auto; display: flex; flex-direction: column; justify-content: center; padding: 40px 0 64px; position: relative; }\n  .home .eyebrow { font-size: 11px; font-weight: 700; letter-spacing: var(--ls-eyebrow); text-transform: uppercase; color: rgba(250,247,240,.72); display: flex; align-items: center; gap: 10px; justify-content: center; margin-bottom: 20px; }\n  .home .eyebrow::before, .home .eyebrow::after { content: \"\"; width: 26px; height: 2px; background: rgba(250,247,240,.5); border-radius: 2px; }\n  .home h1 { font-family: var(--font-serif); font-style: italic; font-weight: 700; text-transform: uppercase; color: var(--hd-cream); text-align: center; font-size: clamp(38px, 7vw, 78px); line-height: 0.98; letter-spacing: 0.005em; margin: 0; }\n  .home .sub { text-align: center; color: rgba(250,247,240,.9); font-size: clamp(15px, 1.7vw, 18px); line-height: 1.55; max-width: 46ch; margin: 20px auto 0; }\n  .home .sub b { font-weight: 700; color: var(--hd-cream); }\n\n  .cats { margin-top: clamp(32px, 5vw, 52px); display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }\n  .cat { position: relative; display: flex; flex-direction: column; gap: 9px; text-decoration: none; background: var(--hd-sage); border: 2.5px solid var(--hd-ink); border-radius: 18px; padding: 30px 30px; min-height: 132px; justify-content: center; transition: transform .16s var(--ease-out, ease), box-shadow .16s ease, background .16s ease; box-shadow: 0 10px 0 -2px rgba(47,47,47,.22); }\n  .cat:hover { transform: translateY(-3px); background: #94a172; box-shadow: 0 16px 0 -2px rgba(47,47,47,.26); }\n  .cat:active { transform: translateY(0); box-shadow: 0 6px 0 -2px rgba(47,47,47,.22); }\n  .cat .cnum { font-family: var(--font-serif); font-style: italic; font-weight: 700; font-size: 15px; color: var(--hd-forest); opacity: .7; }\n  .cat .clabel { font-size: clamp(19px, 2.1vw, 25px); font-weight: 800; letter-spacing: -0.01em; text-transform: uppercase; color: var(--hd-ink); line-height: 1.08; text-decoration: underline; text-decoration-thickness: 2px; text-underline-offset: 4px; }\n  .cat .ccount { font-size: 12.5px; color: var(--hd-forest); font-weight: 600; }\n\n  .home .dand { position: absolute; left: -40px; bottom: -30px; width: 220px; opacity: .5; pointer-events: none; transform: rotate(-8deg); }\n\n  /* ===== CATEGORY (teal) ===== */\n  .cathead { flex: 0 0 auto; padding: 30px 0 8px; }\n  .backlink { display: inline-flex; align-items: center; gap: 8px; background: none; border: none; cursor: pointer; font-family: var(--font-sans); font-size: 13.5px; font-weight: 700; color: rgba(250,247,240,.9); text-decoration: none; letter-spacing: -0.01em; padding: 8px 0; }\n  .backlink:hover { color: var(--hd-cream); }\n  .backlink .ar { font-size: 16px; }\n\n  .catpage { flex: 1 1 auto; display: flex; flex-direction: column; justify-content: center; padding: 16px 0 60px; }\n  .catpage .eyebrow { font-size: 11px; font-weight: 700; letter-spacing: var(--ls-eyebrow); text-transform: uppercase; color: rgba(250,247,240,.72); display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }\n  .catpage .eyebrow::before { content: \"\"; width: 24px; height: 2px; background: rgba(250,247,240,.55); border-radius: 2px; }\n  .catpage h2 { font-size: clamp(30px, 4.6vw, 50px); font-weight: 800; text-transform: lowercase; color: var(--hd-cream); letter-spacing: -0.022em; line-height: 1.02; margin: 0; max-width: 18ch; }\n  .catpage .pick { color: rgba(250,247,240,.9); font-size: 16px; margin: 16px 0 0; }\n  .catpage .pick .it { font-family: var(--font-serif); font-style: italic; font-weight: 700; }\n\n  .dests { margin-top: 30px; display: flex; flex-direction: column; gap: 14px; }\n  .dest { display: flex; align-items: center; gap: 20px; text-decoration: none; background: var(--hd-cream); border-radius: 16px; padding: 22px 26px; transition: transform .16s ease, box-shadow .16s ease; box-shadow: 0 8px 24px rgba(20,30,28,.16); }\n  .dest:hover { transform: translateY(-2px); box-shadow: 0 14px 32px rgba(20,30,28,.22); }\n  .dest .dnum { flex: 0 0 auto; font-family: var(--font-serif); font-style: italic; font-weight: 700; font-size: 26px; color: var(--brand); width: 40px; }\n  .dest .dbody { flex: 1 1 auto; }\n  .dest .dt { font-size: clamp(17px, 2vw, 21px); font-weight: 800; text-transform: lowercase; letter-spacing: -0.015em; color: var(--text-strong); line-height: 1.12; }\n  .dest .dt .it { font-family: var(--font-serif); font-style: italic; font-weight: 700; color: var(--brand); text-transform: none; }\n  .dest .dh { font-size: 13px; color: var(--text-muted); margin-top: 3px; }\n  .dest .darrow { flex: 0 0 auto; color: var(--hd-sage); font-size: 22px; font-weight: 700; transition: transform .16s ease; }\n  .dest:hover .darrow { transform: translateX(4px); color: var(--brand-pressed); }\n\n  /* ===== CARD (cream paper) ===== */\n  body.on-card { background: var(--hd-cream); }\n  .cardview { flex: 1 1 auto; padding: 0 0 70px; }\n  .cardview .topbar { padding-top: 0; }\n  .cardback { padding: 26px 0 0; }\n  .cardback .backlink { color: var(--text-muted); }\n  .cardback .backlink:hover { color: var(--text-strong); }\n\n  .paper { background: var(--surface-page); border: 1.5px solid var(--border-soft); border-radius: 22px; box-shadow: 0 20px 50px rgba(20,30,28,.10); padding: clamp(28px, 4vw, 50px); margin-top: 18px; position: relative; overflow: hidden; }\n\n  .c-eyebrow { font-size: 11px; font-weight: 700; letter-spacing: var(--ls-eyebrow); text-transform: uppercase; color: var(--text-faint); display: flex; align-items: center; gap: 9px; margin-bottom: 12px; }\n  .c-eyebrow::before { content: \"\"; width: 20px; height: 2px; background: var(--brand); border-radius: 2px; flex: 0 0 auto; }\n  .c-title { font-size: clamp(30px, 4.4vw, 46px); font-weight: 800; text-transform: lowercase; letter-spacing: -0.022em; line-height: 1.02; margin: 0; max-width: 20ch; }\n  .c-title .it { font-family: var(--font-serif); font-style: italic; font-weight: 700; color: var(--brand); text-transform: none; }\n  .c-diag { font-size: clamp(14px, 1.7vw, 16.5px); line-height: 1.6; color: var(--text-body); margin: 16px 0 0; max-width: 64ch; }\n  .c-diag .it { font-family: var(--font-serif); font-style: italic; font-weight: 700; color: var(--hd-forest); }\n\n  .c-focus { margin-top: 22px; background: var(--hd-sage-50); border-radius: 14px; padding: 16px 20px; display: flex; gap: 16px; align-items: center; }\n  .c-focus .lab { font-size: 9.5px; font-weight: 700; letter-spacing: var(--ls-eyebrow); text-transform: uppercase; color: var(--brand-pressed); white-space: nowrap; line-height: 1.3; flex: 0 0 auto; }\n  .c-focus p { font-size: clamp(14px, 1.7vw, 16px); line-height: 1.45; color: var(--hd-forest); margin: 0; font-weight: 600; }\n  .c-focus p .it { font-family: var(--font-serif); font-style: italic; font-weight: 700; }\n\n  .c-cols { margin-top: 28px; display: grid; grid-template-columns: 1.06fr 0.94fr; gap: 40px; }\n  .c-col.right { border-left: 1.5px solid var(--border-soft); padding-left: 40px; }\n  .sec-h { font-size: 11px; font-weight: 700; letter-spacing: var(--ls-eyebrow); text-transform: uppercase; color: var(--text-faint); display: flex; align-items: center; gap: 8px; margin: 0 0 16px; }\n  .sec-h::before { content: \"\"; width: 16px; height: 2px; background: var(--brand); border-radius: 2px; flex: 0 0 auto; }\n  .sec-h .done { margin-left: auto; font-size: 11px; letter-spacing: 0; text-transform: none; color: var(--brand); font-weight: 700; font-family: var(--font-serif); font-style: italic; }\n\n  ul.checks { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 4px; }\n  ul.checks li { display: flex; gap: 13px; align-items: flex-start; cursor: pointer; padding: 7px 8px; margin: 0 -8px; border-radius: 9px; transition: background .12s ease; user-select: none; }\n  ul.checks li:hover { background: var(--hd-cream-200); }\n  ul.checks li .box { flex: 0 0 auto; width: 19px; height: 19px; border: 2px solid var(--hd-sage); border-radius: 6px; margin-top: 1px; background: var(--surface-card); display: flex; align-items: center; justify-content: center; }\n  ul.checks li .box svg { width: 12px; height: 12px; opacity: 0; }\n  ul.checks li.checked .box { background: var(--brand); border-color: var(--brand); }\n  ul.checks li.checked .box svg { opacity: 1; }\n  ul.checks li .ctext { font-size: clamp(13.5px, 1.6vw, 15px); line-height: 1.45; color: var(--text-body); }\n  ul.checks li.checked .ctext { color: var(--text-faint); text-decoration: line-through; text-decoration-color: var(--hd-sand-200); }\n  ul.checks li .ctext .it { font-family: var(--font-serif); font-style: italic; font-weight: 700; color: var(--hd-forest); }\n  ul.checks li.checked .ctext .it { color: var(--text-faint); }\n  ul.checks li .ctext strong { font-weight: 700; }\n\n  ol.asks { list-style: none; counter-reset: ask; margin: 0 0 22px; padding: 0; display: flex; flex-direction: column; gap: 12px; }\n  ol.asks li { counter-increment: ask; display: flex; gap: 12px; align-items: baseline; font-size: clamp(13.5px, 1.6vw, 15px); line-height: 1.45; color: var(--text-body); }\n  ol.asks li::before { content: counter(ask); font-family: var(--font-serif); font-style: italic; font-weight: 700; font-size: 17px; color: var(--brand); flex: 0 0 16px; }\n\n  .overthink { margin-top: auto; background: var(--hd-cream-200); border: 1.5px solid var(--border-soft); border-radius: 14px; padding: 16px 18px; }\n  .overthink .ot-h { font-size: 10px; font-weight: 700; letter-spacing: var(--ls-eyebrow); text-transform: uppercase; color: var(--danger); margin: 0 0 8px; }\n  .overthink p { font-size: clamp(12.5px, 1.5vw, 13.5px); line-height: 1.55; color: var(--text-muted); margin: 0; }\n  .overthink p .it { font-family: var(--font-serif); font-style: italic; font-weight: 700; color: var(--hd-forest); }\n\n  .c-foot { margin-top: 30px; display: grid; grid-template-columns: 1.06fr 0.94fr; gap: 40px; align-items: stretch; }\n  .c-win { background: var(--hd-butter); border-radius: 14px; padding: 18px 22px; }\n  .c-win .lab { font-size: 9.5px; font-weight: 700; letter-spacing: var(--ls-eyebrow); text-transform: uppercase; color: var(--hd-forest); display: block; margin-bottom: 7px; }\n  .c-win p { font-size: clamp(14px, 1.7vw, 16px); line-height: 1.4; color: var(--hd-forest); margin: 0; font-weight: 600; }\n  .c-next { padding-left: 40px; border-left: 1.5px solid var(--border-soft); display: flex; flex-direction: column; justify-content: center; }\n  .c-next .lab { font-size: 9.5px; font-weight: 700; letter-spacing: var(--ls-eyebrow); text-transform: uppercase; color: var(--text-faint); display: block; margin-bottom: 7px; }\n  .c-next p { font-size: clamp(13.5px, 1.6vw, 15px); line-height: 1.45; color: var(--text-strong); margin: 0; }\n  .c-next p .arrow { color: var(--brand); font-weight: 700; }\n  .c-next p .it { font-family: var(--font-serif); font-style: italic; font-weight: 700; color: var(--brand-pressed); }\n\n  .c-actions { margin-top: 28px; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }\n  .btn { font-family: var(--font-sans); font-weight: 700; font-size: 14px; text-transform: lowercase; letter-spacing: -0.01em; border-radius: 999px; padding: 12px 22px; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; transition: transform .14s ease, background .14s ease; border: none; }\n  .btn.primary { background: var(--hd-forest); color: var(--hd-cream); }\n  .btn.primary:hover { transform: translateY(-1px); background: var(--hd-forest-600); }\n  .btn.ghost { background: transparent; color: var(--text-muted); border: 1.5px solid var(--border-soft); }\n  .btn.ghost:hover { color: var(--text-strong); border-color: var(--hd-sand-200); }\n\n  .paper .dand { position: absolute; right: -70px; bottom: -64px; width: 230px; opacity: .07; pointer-events: none; }\n\n  .pagefoot { flex: 0 0 auto; padding: 24px 0 30px; }\n  .pagefoot .wrap { display: flex; justify-content: space-between; align-items: center; gap: 16px; }\n  .pagefoot .tag { font-family: var(--font-serif); font-style: italic; font-weight: 700; font-size: 13px; }\n  .pagefoot .brand { font-size: 11.5px; }\n  /* teal screens foot */\n  .stage:not(.is-card) .pagefoot .tag { color: rgba(250,247,240,.92); }\n  .stage:not(.is-card) .pagefoot .brand { color: rgba(250,247,240,.6); }\n  /* card screen foot */\n  .stage.is-card .pagefoot .tag { color: var(--text-strong); }\n  .stage.is-card .pagefoot .brand { color: var(--text-faint); }\n\n  /* ===== responsive ===== */\n  @media (max-width: 760px) {\n    .cats { grid-template-columns: 1fr; gap: 16px; }\n    .cat { min-height: 0; padding: 24px; box-shadow: 0 7px 0 -2px rgba(47,47,47,.22); }\n    .c-cols { grid-template-columns: 1fr; gap: 28px; }\n    .c-col.right { border-left: none; padding-left: 0; border-top: 1.5px solid var(--border-soft); padding-top: 26px; }\n    .c-foot { grid-template-columns: 1fr; gap: 16px; }\n    .c-next { border-left: none; padding-left: 0; border-top: 1.5px solid var(--border-soft); padding-top: 16px; }\n    .dest { gap: 14px; padding: 18px 18px; }\n    .dest .dnum { width: 28px; font-size: 22px; }\n    .home .dand { display: none; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n  \n\n  <div class=\"stage\" id=\"stage\">\n    <div id=\"app\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <script>\n  (function () {\n    \"use strict\";\n\n    var LOGO = \"brand/honest-digital-for-artists-black.png\";\n    var DAND_WHITE = \"brand/dandelion-spreading-white.png\";\n    var DAND_BLACK = \"brand/dandelion-spreading-black.png\";\n\n    var CHECK_SVG = '<svg viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M5 12.5l4.2 4.2L19 7\" stroke=\"#faf7f0\" stroke-width=\"3.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\u002Fsvg>';\n\n    /* ---- categories ---- */\n    var CATS = [\n      { id: \"starting\",  label: \"just starting\",                    cards: [\"01\",\"02\",\"03\"] },\n      { id: \"traction\",  label: \"creating, not getting traction\",   cards: [\"04\",\"05\",\"07\"] },\n      { id: \"working\",   label: \"something's working, what's next?\", cards: [\"06\",\"08\"] },\n      { id: \"lost\",      label: \"a lot's happening, feeling lost\",   cards: [\"09\",\"10\"] }\n    ];\n\n    /* ---- the 10 strategy cards ---- */\n    var CARDS = {\n      \"01\": {\n        eyebrow: \"starting from zero\",\n        title: 'nothing set up <span class=\"it\">yet.<\u002Fspan>',\n        hint: \"zero claimed, zero posted\",\n        diag: \"you're at absolute zero, nothing claimed, nothing posted, maybe not even a name you're sure of. that's not behind, it's a clean start. <span class=\\\"it\\\">the easiest place to build it right is before there's anything to undo.<\u002Fspan>\",\n        focus: 'lock down your name everywhere, then start showing up <span class=\"it\">before you feel ready.<\u002Fspan>',\n        next: [\"decide on your artist name, say it out loud, live with it a few days\",\"run it through a trademark search at <strong>tmsearch.uspto.gov<\u002Fstrong>\",\"claim the handle on every platform, even ones you won't use yet\",\"grab the matching domain, the <strong>.com<\u002Fstrong> if you can\",\"brainstorm 10 content ideas, no filming, just ideas\",\"block one <span class=\\\"it\\\">content day<\u002Fspan> on your calendar this month\",\"pick one platform to start, not five\"],\n        ask: [\"does this name still feel right when I say it out loud?\",\"if a stranger searched it, would they find me, or someone else?\",\"which one platform will I actually keep up with?\",\"am I waiting to feel ready, or am I ready enough to start?\"],\n        stop: \"the perfect name, the logo, the gear. <span class=\\\"it\\\">pick a good name you can own and move.<\u002Fspan> none of the polish matters until you're actually showing up, you grow into the rest.\",\n        win: \"name chosen, trademark-checked, and claimed on at least 3 platforms.\",\n        nextStage: '<span class=\"arrow\">&rarr;<\u002Fspan> <span class=\"it\">claimed, but haven\\'t posted<\u002Fspan> &mdash; the work becomes showing up.'\n      },\n      \"02\": {\n        eyebrow: \"frozen at setup\",\n        title: 'claimed, but haven\\'t <span class=\"it\">posted.<\u002Fspan>',\n        hint: \"set up, but frozen\",\n        diag: \"the accounts exist but they're empty. you did the setup and then froze, waiting for the right first post, the right look, the right moment. <span class=\\\"it\\\">that moment isn't coming, the habit is what's missing.<\u002Fspan>\",\n        focus: 'get publishing on a schedule you can keep, and <span class=\"it\">start quietly collecting your audience.<\u002Fspan>',\n        next: [\"book a content day and bulk-create a week of posts at once\",\"post your first thing, <span class=\\\"it\\\">done beats perfect<\u002Fspan>\",\"set a cadence you can hold, 3x a week is plenty\",\"write one email a week, even two lines\",\"start collecting emails and cell numbers, even if you won't use them yet\",\"optimize your link-in-bio so it's all one tap away\"],\n        ask: [\"what's the smallest post I could publish today?\",\"am I collecting fans I'll actually be able to reach later?\",\"is my bar for \\u201cgood enough\\u201d set way too high?\",\"if I posted 3x a week for a month, what would change?\"],\n        stop: \"perfection. your first posts won't be your best, <span class=\\\"it\\\">they're not supposed to be.<\u002Fspan> making moves now beats a flawless plan you never actually run.\",\n        win: \"a full week of content batched, and your first post live.\",\n        nextStage: '<span class=\"arrow\">&rarr;<\u002Fspan> <span class=\"it\">posting but nothing\\'s happening<\u002Fspan> &mdash; now you ask what\\'s landing.'\n      },\n      \"03\": {\n        eyebrow: \"a gut-check\",\n        title: 'I just want to make music &mdash; <span class=\"it\">not sure about the rest.<\u002Fspan>',\n        hint: \"not sure about the rest\",\n        diag: \"you love making music, but the marketing, posting, and hustle make your stomach turn. before you force yourself through any of it, <span class=\\\"it\\\">it's worth getting honest about what you actually want this to be.<\u002Fspan>\",\n        focus: 'decide if you want to make art, or make art <span class=\"it\">and get it to the masses.<\u002Fspan> both are valid.',\n        next: [\"sit with the questions, no rush, no right answer\",\"picture a year of consistent posting, exciting or exhausting?\",\"separate <span class=\\\"it\\\">\\u201cI hate this\\u201d<\u002Fspan> from <span class=\\\"it\\\">\\u201cI haven't learned this yet\\u201d<\u002Fspan>\",\"if it's just for you, protect it and let it stay a joy\",\"if it's for the masses, accept the business comes with the art\",\"talk to one artist a step ahead about what it really takes\"],\n        ask: [\"is this my passion, or do I want it to be my livelihood?\",\"am I willing to do this even when it's hard? because it will be.\",\"can I handle a long stretch alone before a team shows up?\",\"do I want to create art, or create art and get it to people?\",\"what am I actually afraid of, the work or being seen?\"],\n        stop: \"whether keeping music as a passion makes you <span class=\\\"it\\\">\\u201cless\\u201d<\u002Fspan> of an artist. it doesn't. the honest answer here saves you years of forcing something you didn't want.\",\n        win: \"an honest answer to one question: do I want the business, or just the art?\",\n        nextStage: '<span class=\"arrow\">&rarr;<\u002Fspan> want the masses? go to <span class=\"it\">nothing set up yet.<\u002Fspan> just the art? keep making.'\n      },\n      \"04\": {\n        eyebrow: \"posting into the void\",\n        title: 'I\\'m posting content but <span class=\"it\">nothing\\'s happening.<\u002Fspan>',\n        hint: \"showing up, no movement\",\n        diag: \"you're showing up consistently and the numbers won't move. it's frustrating, and it's easy to feel invisible. usually it's not effort that's missing, <span class=\\\"it\\\">it's the type of content, the platform, or an honest look at the music itself.<\u002Fspan>\",\n        focus: 'audit what you\\'re posting, find the faint signal, and <span class=\"it\">stop repeating what clearly isn\\'t connecting.<\u002Fspan>',\n        next: [\"list your last 20 posts and mark the format of each\",\"find your single best post, what was different?\",\"make 3 more like it before trying anything new\",\"ride one trend or sound as an <span class=\\\"it\\\">accelerator<\u002Fspan> this week\",\"try a format you've avoided, talking to camera, behind-the-scenes\",\"test the same content on a different platform\",\"honestly ask: is the music itself ready?\"],\n        ask: [\"what's the best response I've gotten, and can I repeat it?\",\"am I making content I'd actually stop scrolling for?\",\"is this a content problem or a song problem?\",\"which platform fits what I make best?\"],\n        stop: \"the follower count. a few <span class=\\\"it\\\">\\u201cthis is fire\\u201d<\u002Fspan> comments on one post is a louder signal than a flat 500-view streak. chase the signal, not the vanity number.\",\n        win: \"three new posts modeled on your best one, plus one trend ridden.\",\n        nextStage: '<span class=\"arrow\">&rarr;<\u002Fspan> something working? go to <span class=\"it\">things are moving, keep growing.<\u002Fspan>'\n      },\n      \"05\": {\n        eyebrow: \"music out, no ecosystem\",\n        title: 'my music is on dsps but I have <span class=\"it\">no digital presence.<\u002Fspan>',\n        hint: \"music out, no ecosystem\",\n        diag: \"the music's out on spotify and apple, but there's nothing around it, no face, no website, no reason to follow. right now you're a song with no story attached, <span class=\\\"it\\\">and that makes you easy to skip past.<\u002Fspan>\",\n        focus: 'become findable, build the platforms you own, and <span class=\"it\">let people see the human behind the sound.<\u002Fspan>',\n        next: [\"claim and fill every social profile, same name and photo\",\"claim <strong>Spotify for Artists<\u002Fstrong> and your Apple Music profile\",\"build a simple website so you're searchable, not just streamable\",\"post your first face-to-camera video, <span class=\\\"it\\\">yes, it'll feel cringe<\u002Fspan>\",\"make your name pull up <span class=\\\"it\\\">you<\u002Fspan> on Google, Instagram, and AI\",\"link dsps, socials, and email sign-up in one place\"],\n        ask: [\"if someone hears my song, can they find me in 10 seconds?\",\"would I follow this profile, or does it feel empty?\",\"what's keeping me off camera, and is it worth the cost?\",\"where do I want fans to land when they search me?\"],\n        stop: \"the cringe. everyone is bad on camera at first, <span class=\\\"it\\\">that's the toll, not a sign to stop.<\u002Fspan> the artists you admire pushed through the exact same awkward phase.\",\n        win: \"profiles claimed, a basic site live, and one face-to-camera video posted.\",\n        nextStage: '<span class=\"arrow\">&rarr;<\u002Fspan> <span class=\"it\">posting but nothing\\'s happening<\u002Fspan> &mdash; now there\\'s an ecosystem to grow.'\n      },\n      \"06\": {\n        eyebrow: \"you've got momentum\",\n        title: 'things are moving and I want to <span class=\"it\">keep growing.<\u002Fspan>',\n        hint: \"ride the momentum\",\n        diag: \"something's working. posts are landing, followers are ticking up, and you can feel momentum. the risk now is staying random, <span class=\\\"it\\\">riding luck instead of building a system you can repeat.<\u002Fspan>\",\n        focus: 'double down on what works, and move fans from rented platforms to <span class=\"it\">an audience you own.<\u002Fspan>',\n        next: [\"identify your top 3 posts and find the pattern\",\"recreate what works, same format, new content\",\"batch and schedule, <span class=\\\"it\\\">bulk create, bulk post<\u002Fspan>\",\"push followers to a form to capture emails\",\"offer exclusivity for signing up, <span class=\\\"it\\\">they get to know first<\u002Fspan>\",\"start one long-term channel, email or youtube, alongside social\"],\n        ask: [\"what specifically is working, format, topic, or platform?\",\"am I building on rented land or land I own?\",\"if a platform vanished tomorrow, could I still reach my fans?\",\"what's the repeatable version of my best week?\"],\n        stop: \"reinventing every post. growth isn't constant novelty, <span class=\\\"it\\\">it's finding what works and running it again<\u002Fspan> with discipline. recreate, don't restart.\",\n        win: \"your top pattern identified, repeated once, and an email capture live.\",\n        nextStage: '<span class=\"arrow\">&rarr;<\u002Fspan> <span class=\"it\">lots is happening, what to focus on<\u002Fspan> &mdash; a good problem to have.'\n      },\n      \"07\": {\n        eyebrow: \"the stall\",\n        title: 'I had momentum but now it\\'s <span class=\"it\">stalled.<\u002Fspan>',\n        hint: \"it went quiet\",\n        diag: \"it was moving, and now it's quiet. that dip feels like failure, but it's normal, and it's not a reason to panic-spiral or burn it all down. <span class=\\\"it\\\">you already have proof of what works, you just stopped doing it.<\u002Fspan>\",\n        focus: 'reset to basics, repeat what\\'s already worked, and rebuild consistency, <span class=\"it\">no overhaul required.<\u002Fspan>',\n        next: [\"pull up what worked during your best stretch\",\"repeat your top content, <span class=\\\"it\\\">don't reinvent, recreate<\u002Fspan>\",\"get back to a steady cadence you can hold\",\"ride a current trend to jump-start traction again\",\"test one new angle alongside the proven stuff\",\"cut whatever you kept doing out of habit that never landed\"],\n        ask: [\"what was I doing differently when it was working?\",\"what's the best response I ever got, can I repeat it now?\",\"did I drift from what worked, or just stop being consistent?\",\"am I resetting, or panicking?\"],\n        stop: \"that you need a brand-new strategy. you don't, <span class=\\\"it\\\">you need to go back to basics<\u002Fspan> and do the proven thing consistently again. stalls usually mean you stopped, not that the playbook broke.\",\n        win: \"one proven post recreated, and a steady cadence back on the calendar.\",\n        nextStage: '<span class=\"arrow\">&rarr;<\u002Fspan> momentum back? go to <span class=\"it\">things are moving, keep growing.<\u002Fspan>'\n      },\n      \"08\": {\n        eyebrow: \"the pre-release\",\n        title: 'building an audience but <span class=\"it\">haven\\'t dropped music yet.<\u002Fspan>',\n        hint: \"time to release\",\n        diag: \"you've got people watching, but you keep \\u201cbuilding\\u201d instead of releasing. at some point that's just hiding. <span class=\\\"it\\\">if the music's ready, the audience you've built is exactly who it's for, stop waiting.<\u002Fspan>\",\n        focus: 'if the song\\'s ready, set a date and run a <span class=\"it\">simple 4-week release plan.<\u002Fspan>',\n        nextLabel: \"the 4-week countdown\",\n        next: [\"<strong>4 wks out<\u002Fstrong> &mdash; tease a few times a week, swap banners, say <span class=\\\"it\\\">\\u201ccoming soon\\u201d<\u002Fspan> (no date)\",\"<strong>4 wks out<\u002Fstrong> &mdash; send \\u201cget ready\\u201d emails, flip your website\",\"<strong>3 wks out<\u002Fstrong> &mdash; announce the date, post daily, hook them on the sound\",\"<strong>2 wks out<\u002Fstrong> &mdash; hold cadence, run a giveaway for emails + texts\",\"<strong>1 wk out<\u002Fstrong> &mdash; update dates everywhere, get your links ready\",\"<strong>release day<\u002Fstrong> &mdash; drop it, keep posting, the work's just starting\",\"<strong>after<\u002Fstrong> &mdash; put your official sound on the content you already make\"],\n        ask: [\"is the music actually ready, or am I hiding behind \\u201cbuilding\\u201d?\",\"will the sound feel familiar to my audience by release day?\",\"do I have a date, or just a someday?\",\"what am I really waiting for?\"],\n        stop: \"whether the audience is <span class=\\\"it\\\">\\u201cbig enough.\\u201d<\u002Fspan> it's big enough to start. a real release to a small warm audience beats an imaginary perfect launch. pick the date.\",\n        win: \"a release date on the calendar, and your 4-week countdown started.\",\n        nextStage: '<span class=\"arrow\">&rarr;<\u002Fspan> <span class=\"it\">no digital presence<\u002Fspan> or <span class=\"it\">keep growing<\u002Fspan> &mdash; now the real work begins.'\n      },\n      \"09\": {\n        eyebrow: \"scattered\",\n        title: 'lots is happening and I don\\'t know <span class=\"it\">what to focus on.<\u002Fspan>',\n        hint: \"too many directions\",\n        diag: \"things are working on a few fronts at once, and instead of feeling good it feels scattered. you're spread thin, doing a little of everything and not enough of anything. <span class=\\\"it\\\">the fix isn't more, it's choosing.<\u002Fspan>\",\n        focus: 'find what has the most heat, and <span class=\"it\">pour your time and money into that one thing first.<\u002Fspan>',\n        next: [\"list everything you're currently splitting attention across\",\"mark which one has the most genuine traction, <span class=\\\"it\\\">the heat<\u002Fspan>\",\"choose that one as your priority for the next 30 days\",\"move your time and budget behind it, not everything\",\"put the rest on a <span class=\\\"it\\\">\\u201clater\\u201d<\u002Fspan> list, not gone, just paused\",\"set one metric that tells you it's still the right bet\"],\n        ask: [\"which channel is genuinely pulling, not just busy?\",\"what am I doing out of fear of missing out vs. real results?\",\"if I could only keep one effort, which would it be?\",\"what would focus actually feel like for the next month?\"],\n        stop: \"that focusing means abandoning everything else. it doesn't, <span class=\\\"it\\\">it means sequencing.<\u002Fspan> the other things wait their turn, one priority done well beats five done halfway.\",\n        win: \"one clear priority chosen, with your time and budget moved behind it.\",\n        nextStage: '<span class=\"arrow\">&rarr;<\u002Fspan> <span class=\"it\">keep growing<\u002Fspan> &mdash; now grow the one thing on purpose.'\n      },\n      \"10\": {\n        eyebrow: \"attention, uncaptured\",\n        title: 'my socials are popping but <span class=\"it\">I don\\'t know what else to do.<\u002Fspan>',\n        hint: \"attention, uncaptured\",\n        diag: \"you've got real attention, the views are there. but it may not be connected to your music or anything you own yet. <span class=\\\"it\\\">right now you're known for content, the job is turning that into a music career.<\u002Fspan>\",\n        focus: 'convert social attention into <span class=\"it\">music discovery, an owned audience, and real opportunities.<\u002Fspan>',\n        next: [\"build a website and start an email list, <span class=\\\"it\\\">own the audience<\u002Fspan>\",\"work your music into normal content, subtly at first\",\"swap the trending sounds you use for your own song\",\"get others to use your sound, ask, collab, invite\",\"make your bio and site say clearly who you are and what you make\",\"start a weekly email, news, exclusives, events\",\"run giveaways for your email + sms list\",\"put ads only behind what's already working\"],\n        ask: [\"does my audience know I make music, or just that I make content?\",\"if I posted a song tomorrow, would these followers care?\",\"what attention do I have that I'm not converting?\",\"who could I collab with to reach further?\"],\n        stop: \"protecting the <span class=\\\"it\\\">\\u201cpure\\u201d<\u002Fspan> content. weaving your music in won't kill your reach if you do it naturally, your audience came for you, and you make music.\",\n        win: \"email list started, plus your own sound added to one piece of content.\",\n        nextStage: '<span class=\"arrow\">&rarr;<\u002Fspan> <span class=\"it\">keep growing<\u002Fspan> &mdash; turn the attention into a career.'\n      }\n    };\n\n    var ORDER = [\"01\",\"02\",\"03\",\"04\",\"05\",\"06\",\"07\",\"08\",\"09\",\"10\"];\n\n    /* ---- storage for checkbox progress ---- */\n    function loadChecks(id) {\n      try { return JSON.parse(localStorage.getItem(\"hd-sf-\" + id)) || {}; }\n      catch (e) { return {}; }\n    }\n    function saveChecks(id, obj) {\n      try { localStorage.setItem(\"hd-sf-\" + id, JSON.stringify(obj)); } catch (e) {}\n    }\n\n    function catOf(cardId) {\n      for (var i = 0; i < CATS.length; i++) {\n        if (CATS[i].cards.indexOf(cardId) !== -1) return CATS[i];\n      }\n      return null;\n    }\n    function esc(s) { return s; }\n\n    var app = document.getElementById(\"app\");\n    var stage = document.getElementById(\"stage\");\n\n    /* ---------- views ---------- */\n    function topbar(kick) {\n      return '<div class=\"topbar\"><div class=\"wrap\">' +\n        '<a href=\"#\" style=\"display:flex\"><img class=\"logo\" src=\"' + LOGO + '\" alt=\"honest digital for artists\" /><\u002Fa>' +\n        '<div class=\"kick\">' + kick + '<\u002Fdiv>' +\n        '<\u002Fdiv><\u002Fdiv>';\n    }\n    function pagefoot(tag) {\n      return '<div class=\"pagefoot\"><div class=\"wrap\">' +\n        '<span class=\"tag\">' + tag + '<\u002Fspan>' +\n        '<span class=\"brand\">honest digital for artists<\u002Fspan>' +\n        '<\u002Fdiv><\u002Fdiv>';\n    }\n\n    function renderHome() {\n      document.body.classList.remove(\"on-card\");\n      stage.classList.remove(\"is-card\");\n      var cats = CATS.map(function (c, i) {\n        var n = c.cards.length;\n        return '<a class=\"cat\" href=\"#cat/' + c.id + '\">' +\n          '<span class=\"cnum\">0' + (i + 1) + '<\u002Fspan>' +\n          '<span class=\"clabel\">' + c.label + '<\u002Fspan>' +\n          '<span class=\"ccount\">' + n + ' place' + (n === 1 ? '' : 's') + ' you might be headed<\u002Fspan>' +\n          '<\u002Fa>';\n      }).join(\"\");\n\n      app.innerHTML =\n        topbar('the strategy finder') +\n        '<div class=\"home view\"><div class=\"wrap\">' +\n          '<div class=\"eyebrow\">honest digital for artists<\u002Fdiv>' +\n          '<h1>where are you<br/>starting?<\u002Fh1>' +\n          '<p class=\"sub\">pick the bucket that sounds most like you right now. <b>then choose where you\\u2019re headed next<\u002Fb> \\u2014 you\\u2019ll get one honest, do-this-now checklist.<\u002Fp>' +\n          '<div class=\"cats\">' + cats + '<\u002Fdiv>' +\n          '<img class=\"dand\" src=\"' + DAND_WHITE + '\" alt=\"\" />' +\n        '<\u002Fdiv><\u002Fdiv>' +\n        pagefoot('start where you are.');\n    }\n\n    function renderCat(catId) {\n      var cat = null;\n      for (var i = 0; i < CATS.length; i++) if (CATS[i].id === catId) cat = CATS[i];\n      if (!cat) { location.hash = \"\"; return; }\n      document.body.classList.remove(\"on-card\");\n      stage.classList.remove(\"is-card\");\n\n      var dests = cat.cards.map(function (cid) {\n        var c = CARDS[cid];\n        return '<a class=\"dest\" href=\"#card/' + cid + '\">' +\n          '<span class=\"dnum\">' + cid + '<\u002Fspan>' +\n          '<span class=\"dbody\"><span class=\"dt\">' + c.title + '<\u002Fspan>' +\n          '<span class=\"dh\">' + c.hint + '<\u002Fspan><\u002Fspan>' +\n          '<span class=\"darrow\">&rarr;<\u002Fspan>' +\n          '<\u002Fa>';\n      }).join(\"\");\n\n      app.innerHTML =\n        topbar('the strategy finder') +\n        '<div class=\"cathead\"><div class=\"wrap\">' +\n          '<a class=\"backlink\" href=\"#\"><span class=\"ar\">&larr;<\u002Fspan> where you are<\u002Fa>' +\n        '<\u002Fdiv><\u002Fdiv>' +\n        '<div class=\"catpage view\"><div class=\"wrap\">' +\n          '<div class=\"eyebrow\">you said<\u002Fdiv>' +\n          '<h2>' + cat.label + '<\u002Fh2>' +\n          '<p class=\"pick\">pick the one that sounds most like you. <span class=\"it\">that\\u2019s your destination.<\u002Fspan><\u002Fp>' +\n          '<div class=\"dests\">' + dests + '<\u002Fdiv>' +\n        '<\u002Fdiv><\u002Fdiv>' +\n        pagefoot('one honest next step.');\n    }\n\n    function renderCard(cardId) {\n      var c = CARDS[cardId];\n      if (!c) { location.hash = \"\"; return; }\n      var cat = catOf(cardId);\n      document.body.classList.add(\"on-card\");\n      stage.classList.add(\"is-card\");\n\n      var checks = loadChecks(cardId);\n      var items = c.next.map(function (t, idx) {\n        var on = checks[idx] ? \" checked\" : \"\";\n        return '<li data-idx=\"' + idx + '\" class=\"' + (on ? \"checked\" : \"\") + '\">' +\n          '<span class=\"box\">' + CHECK_SVG + '<\u002Fspan>' +\n          '<span class=\"ctext\">' + t + '<\u002Fspan><\u002Fli>';\n      }).join(\"\");\n\n      var asks = c.ask.map(function (q) { return '<li>' + q + '<\u002Fli>'; }).join(\"\");\n      var nextLabel = c.nextLabel || \"do this next\";\n      var backHref = cat ? (\"#cat/\" + cat.id) : \"#\";\n      var backText = cat ? cat.label : \"where you are\";\n\n      app.innerHTML =\n        '<div class=\"cardview view\">' +\n        topbar('the strategy finder') +\n        '<div class=\"cardback\"><div class=\"wrap\">' +\n          '<a class=\"backlink\" href=\"' + backHref + '\"><span class=\"ar\">&larr;<\u002Fspan> back to \\u201c' + backText + '\\u201d<\u002Fa>' +\n        '<\u002Fdiv><\u002Fdiv>' +\n        '<div class=\"wrap\"><div class=\"paper\">' +\n          '<div class=\"c-eyebrow\">where you are &middot; ' + c.eyebrow + '<\u002Fdiv>' +\n          '<h1 class=\"c-title\">' + c.title + '<\u002Fh1>' +\n          '<p class=\"c-diag\">' + c.diag + '<\u002Fp>' +\n          '<div class=\"c-focus\"><span class=\"lab\">the real<br/>focus<\u002Fspan><p>' + c.focus + '<\u002Fp><\u002Fdiv>' +\n          '<div class=\"c-cols\">' +\n            '<div class=\"c-col left\">' +\n              '<div class=\"sec-h\">' + nextLabel + '<span class=\"done\" data-done><\u002Fspan><\u002Fdiv>' +\n              '<ul class=\"checks\" id=\"checks\">' + items + '<\u002Ful>' +\n            '<\u002Fdiv>' +\n            '<div class=\"c-col right\">' +\n              '<div class=\"sec-h\">ask yourself<\u002Fdiv>' +\n              '<ol class=\"asks\">' + asks + '<\u002Fol>' +\n              '<div class=\"overthink\"><div class=\"ot-h\">stop overthinking<\u002Fdiv><p>' + c.stop + '<\u002Fp><\u002Fdiv>' +\n            '<\u002Fdiv>' +\n          '<\u002Fdiv>' +\n          '<div class=\"c-foot\">' +\n            '<div class=\"c-win\"><span class=\"lab\">this week\\u2019s win<\u002Fspan><p>' + c.win + '<\u002Fp><\u002Fdiv>' +\n            '<div class=\"c-next\"><span class=\"lab\">next stage<\u002Fspan><p>' + c.nextStage + '<\u002Fp><\u002Fdiv>' +\n          '<\u002Fdiv>' +\n          '<div class=\"c-actions\">' +\n            '<a class=\"btn ghost\" href=\"' + backHref + '\">&larr; other destinations<\u002Fa>' +\n            '<a class=\"btn primary\" href=\"#\">start over<\u002Fa>' +\n          '<\u002Fdiv>' +\n          '<img class=\"dand\" src=\"' + DAND_BLACK + '\" alt=\"\" />' +\n        '<\u002Fdiv><\u002Fdiv>' +\n        pagefoot('start where you are.') +\n        '<\u002Fdiv>';\n\n      // wire checkboxes\n      var ul = document.getElementById(\"checks\");\n      var doneEl = ul.parentNode.querySelector(\"[data-done]\");\n      function refreshDone() {\n        var total = c.next.length, n = 0, cur = loadChecks(cardId);\n        for (var k in cur) if (cur[k]) n++;\n        doneEl.textContent = n > 0 ? (n + \" / \" + total) : \"\";\n      }\n      ul.addEventListener(\"click\", function (e) {\n        var li = e.target.closest(\"li\"); if (!li) return;\n        var idx = li.getAttribute(\"data-idx\");\n        var cur = loadChecks(cardId);\n        cur[idx] = !cur[idx];\n        if (!cur[idx]) delete cur[idx];\n        saveChecks(cardId, cur);\n        li.classList.toggle(\"checked\", !!cur[idx]);\n        refreshDone();\n      });\n      refreshDone();\n      window.scrollTo(0, 0);\n    }\n\n    /* ---------- router ---------- */\n    function route() {\n      var h = location.hash.replace(/^#/, \"\");\n      if (h.indexOf(\"card/\") === 0) { renderCard(h.slice(5)); return; }\n      if (h.indexOf(\"cat/\") === 0) { renderCat(h.slice(4)); return; }\n      renderHome();\n      window.scrollTo(0, 0);\n    }\n    window.addEventListener(\"hashchange\", route);\n    route();\n  })();\n  <\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
